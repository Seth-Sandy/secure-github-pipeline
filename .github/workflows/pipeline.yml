name: Secure CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  security-pipeline:
    runs-on: ubuntu-latest

    steps:
    # -----------------------------
    # Checkout Code
    # -----------------------------
    - name: Checkout Code
      uses: actions/checkout@v3

    # -----------------------------
    # Secret Scan (FAIL if found)
    # -----------------------------
    - name: Run Gitleaks
      uses: gitleaks/gitleaks-action@v2

    # -----------------------------
    # SAST Scan (WARNING only)
    # -----------------------------
    - name: Run Semgrep
      uses: returntocorp/semgrep-action@v1
      continue-on-error: true

    # -----------------------------
    # Dependency Scan (STRICT)
    # -----------------------------
    - name: Trivy FS Scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        format: 'table'
        severity: 'HIGH,CRITICAL'
        exit-code: '1'

    # -----------------------------
    # Build Docker Image
    # -----------------------------
    - name: Build Docker Image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/secure-app .

    # -----------------------------
    # Image Scan (STRICT)
    # -----------------------------
    - name: Scan Docker Image
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: '${{ secrets.DOCKER_USERNAME }}/secure-app'
        severity: 'HIGH,CRITICAL'
        exit-code: '1'

    # -----------------------------
    # Docker Login
    # -----------------------------
    - name: Login to DockerHub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    # -----------------------------
    # Push Image
    # -----------------------------
    - name: Push Docker Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/secure-app
